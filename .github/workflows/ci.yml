name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, typecheck and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # The server serves the built app, and the browser tests open it, so the
      # build has to happen before the tests rather than after.
      - name: Build
        run: pnpm build

      # Some of what this project promises can only be checked in a real browser,
      # so the end-to-end suite is part of the same gate, not an optional extra.
      - name: Install browsers
        run: pnpm --filter @open-artifact/e2e install-browsers

      - name: Test
        run: pnpm test

      - name: Upload end-to-end report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7
